<!DOCTYPE html>
<html>
<head>
  <title>Zened - Confirm Account</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;background:#f5f5f5;">

  <div style="background:white;padding:30px;border-radius:10px;width:320px;text-align:center;">

    <h2>Confirming your account</h2>
    <p id="status">Please wait while we verify your email...</p>

    <div id="success" style="display:none;">
      <h3 style="color:green;">Account confirmed 🎉</h3>
      <p>You can now sign in to Zened.</p>
      <a href="/" style="display:inline-block;margin-top:10px;padding:10px 15px;background:black;color:white;text-decoration:none;border-radius:6px;">
        Go to app
      </a>
    </div>

    <div id="error" style="display:none;color:red;">
      <h3>Link expired or invalid</h3>
      <p>Please request a new confirmation email.</p>
    </div>

  </div>

  <!-- SUPABASE AUTH LOGIC -->
  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    // 🔴 REPLACE THESE
    const supabaseUrl = "https://YOUR_PROJECT.supabase.co";
    const supabaseKey = "YOUR_ANON_KEY";

    const supabase = createClient(supabaseUrl, supabaseKey);

    async function handleAuth() {
      const { error } = await supabase.auth.getSessionFromUrl({
        storeSession: true
      });

      document.getElementById("status").style.display = "none";

      if (error) {
        document.getElementById("error").style.display = "block";
        console.log("Auth error:", error.message);
      } else {
        document.getElementById("success").style.display = "block";
      }
    }

    handleAuth();
  </script>

</body>
</html>
