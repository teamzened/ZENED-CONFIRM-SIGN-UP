<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zened</title>

  <style>
    body {
      margin: 0;
      background: #0b0b0f;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .spinner {
      width: 42px;
      height: 42px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top: 3px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      text-align: center;
      opacity: 0.7;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div id="loader" class="spinner"></div>
  <div id="error" class="error" style="display:none;"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseUrl = "https://basumndrghcrkxdysmdn.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhc3VtbmRyZ2hjcmt4ZHlzbWRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1ODg2NTUsImV4cCI6MjA5NDE2NDY1NX0.l7nuTRv-pP2BcTLmG2tdgoHDPeQFzGF9zMnfGr_kOv0";

    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    async function handleConfirm() {
      try {
        console.log("Confirm page loaded");
        console.log("URL:", window.location.href);

        const url = window.location.href;

        
        if (!url.includes("code=")) {
          showError("Invalid or expired confirmation link.");
          return;
        }

        
        const { error } = await supabase.auth.exchangeCodeForSession(url);

        if (error) {
          console.log("Auth error:", error);
          showError("Link expired or invalid. Please request a new email.");
          return;
        }

        
        window.location.href = "/";

      } catch (err) {
        console.log("Fatal error:", err);
        showError("Something went wrong. Please try again.");
      }
    }

    function showError(msg) {
      document.getElementById("loader").style.display = "none";
      const errorBox = document.getElementById("error");
      errorBox.style.display = "block";
      errorBox.innerText = msg;
    }

    handleConfirm();
  </script>

</body>
</html>
