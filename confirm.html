<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zened</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0b0b0f;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .loader {
      width: 45px;
      height: 45px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top: 3px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

  <div class="loader"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseUrl = "https://basumndrghcrkxdysmdn.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhc3VtbmRyZ2hjcmt4ZHlzbWRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1ODg2NTUsImV4cCI6MjA5NDE2NDY1NX0.l7nuTRv-pP2BcTLmG2tdgoHDPeQFzGF9zMnfGr_kOv0";

    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    async function handleAuth() {
      try {
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);

        const access_token = params.get("access_token");
        const refresh_token = params.get("refresh_token");

        if (!access_token || !refresh_token) {
          console.log("No tokens found in URL");
          document.body.innerHTML = "<p>Invalid or expired link</p>";
          return;
        }

        const { error } = await supabase.auth.setSession({
          access_token,
          refresh_token
        });

        if (error) {
          console.log("Session error:", error.message);
          document.body.innerHTML = "<p>Authentication failed</p>";
          return;
        }

        window.location.href = "/";

      } catch (err) {
        console.log(err);
        document.body.innerHTML = "<p>Something went wrong</p>";
      }
    }

    handleAuth();
  </script>

</body>
</html>
