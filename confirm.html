<!DOCTYPE html>
<html>

  <title>Zened - Confirming</title>
</head>

<body style="font-family: Arial; text-align:center; padding-top:100px;">
  <h2 id="status">Confirming your account...</h2>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabase = createClient(
      "basumndrghcrkxdysmdn",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhc3VtbmRyZ2hjcmt4ZHlzbWRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1ODg2NTUsImV4cCI6MjA5NDE2NDY1NX0.l7nuTRv-pP2BcTLmG2tdgoHDPeQFzGF9zMnfGr_kOv0"
    )

    async function run() {
      console.log("Confirm page loaded")

      const { data, error } =
        await supabase.auth.exchangeCodeForSession(window.location.href)

      if (error) {
        console.error("Auth error:", error)

        document.getElementById("status").innerText =
          "Link expired or invalid"

        return
      }

      console.log("Session created:", data)

      document.getElementById("status").innerText =
        "Account confirmed! Redirecting..."

      setTimeout(() => {
        window.location.href = "/"
      }, 1500)
    }

    run()
  </script>
</body>
</html>
