<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZENED Support</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f5f7fb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      padding: 28px;
      border-radius: 16px;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 24px;
      font-weight: 700;
    }

    p {
      color: #555;
      font-size: 14px;
      line-height: 1.5;
    }

    .email-box {
      margin: 20px 0;
      padding: 14px;
      background: #f1f3f8;
      border-radius: 12px;
    }

    .label {
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
    }

    a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
    }

    .small {
      font-size: 12px;
      color: #888;
      margin-top: 12px;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>ZENED Support</h1>

    <p>
      Need help with ZENED? Contact our support team and we’ll get back to you as soon as possible.
    </p>

    <div class="email-box">
      <div class="label">Support Email</div>
      <a href="mailto:hello@zenedapp.com">hello@zenedapp.com</a>
    </div>

    <div class="small">
      We aim to respond within 24–48 hours.
    </div>
  </div>

</body>
</html>
