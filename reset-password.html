<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zened — Reset your password</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
      background: #f5f0ea;
      color: #2c2c2e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 48px 36px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
    }

    .icon {
      font-size: 48px;
      margin-bottom: 20px;
      display: block;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      color: #2c2c2e;
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    p {
      font-size: 15px;
      color: #6c6c70;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .btn {
      display: inline-block;
      background: #6b8f71;
      color: #fff;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.2px;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }

    .error {
      color: #c0392b;
      font-size: 14px;
      margin-top: 16px;
    }

    .spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 3px solid #e5e0d8;
      border-top-color: #6b8f71;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="spinner"></div>
    <p>Opening Zened…</p>
  </div>

  <script>
    (function () {
      // Supabase embeds tokens in the URL fragment: #access_token=...&type=recovery
      var hash = window.location.hash.substring(1);   // strip leading #
      var query = window.location.search.substring(1); // fallback: query string

      function parseParams(str) {
        var params = {};
        str.split("&").forEach(function (pair) {
          var parts = pair.split("=");
          if (parts.length === 2) {
            params[decodeURIComponent(parts[0])] = decodeURIComponent(parts[1]);
          }
        });
        return params;
      }

      var params = parseParams(hash) || parseParams(query);
      var accessToken   = params["access_token"]   || params["token"];
      var refreshToken  = params["refresh_token"]  || "";
      var type          = params["type"]            || "";

      function showError(msg) {
        document.getElementById("card").innerHTML =
          '<span class="icon">⚠️</span>' +
          '<h1>Link expired</h1>' +
          '<p>' + msg + '</p>' +
          '<p class="error">Please request a new password reset link in the Zened app.</p>';
      }

      function showSuccess(deepLink) {
        document.getElementById("card").innerHTML =
          '<span class="icon">🔐</span>' +
          '<h1>Reset your password</h1>' +
          '<p>Tap the button below to open Zened and choose a new password.</p>' +
          '<a class="btn" href="' + deepLink + '">Open Zened</a>';
      }

      if (!accessToken) {
        showError("No token was found in this link.");
        return;
      }

      // Build the deep link back into the app
      var deepLink = "zened://reset-password" +
        "?access_token="  + encodeURIComponent(accessToken) +
        "&refresh_token=" + encodeURIComponent(refreshToken) +
        "&type="          + encodeURIComponent(type);

      // Try to open the app automatically
      window.location.href = deepLink;

      // After a short delay, if still here show the manual button
      setTimeout(function () {
        showSuccess(deepLink);
      }, 800);
    })();
  </script>
</body>
</html>
