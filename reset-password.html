<!DOCTYPE html>
<html>
<head>
  <title>Zened Reset Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    input, button {
      padding: 12px;
      margin: 8px;
      width: 260px;
      border-radius: 6px;
      border: none;
    }
    button { cursor: pointer; }
    #status { margin-top: 10px; font-size: 14px; opacity: 0.8; }
  </style>
</head>
<body>
  <h2>Reset Password</h2>
  <input type="password" id="password" placeholder="New password" />
  <button id="submitBtn" disabled onclick="updatePassword()">Update Password</button>
  <div id="status">Loading session...</div>

  <script>
    const { createClient } = window.supabase;
    const supabase = createClient(
      "https://basumndrghcrkxdysmdn.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhc3VtbmRyZ2hjcmt4ZHlzbWRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1ODg2NTUsImV4cCI6MjA5NDE2NDY1NX0.l7nuTRv-pP2BcTLmG2tdgoHDPeQFzGF9zMnfGr_kOv0"
    );

    const status = document.getElementById("status");
    const submitBtn = document.getElementById("submitBtn");

    // Listen for the PASSWORD_RECOVERY event - this fires when Supabase
    // detects the recovery token in the URL hash automatically
    supabase.auth.onAuthStateChange((event, session) => {
      console.log("Auth event:", event, session);

      if (event === "PASSWORD_RECOVERY") {
        status.innerText = "Session ready — enter your new password";
        submitBtn.disabled = false;
      } else if (event === "SIGNED_IN" && session) {
        // Some versions fire SIGNED_IN instead
        status.innerText = "Session ready — enter your new password";
        submitBtn.disabled = false;
      }
    });

    // Fallback: check if there's already a session on load
    supabase.auth.getSession().then(({ data }) => {
      console.log("Existing session:", data.session);
      if (data.session) {
        status.innerText = "Session ready — enter your new password";
        submitBtn.disabled = false;
      }
    });

    async function updatePassword() {
      const password = document.getElementById("password").value;
      if (!password) return;

      submitBtn.disabled = true;
      status.innerText = "Updating...";

      const { error } = await supabase.auth.updateUser({ password });

      if (error) {
        status.innerText = "Error: " + error.message;
        submitBtn.disabled = false;
      } else {
        status.innerText = "✅ Password updated! You can close this page.";
      }
    }
  </script>
</body>
</html>
