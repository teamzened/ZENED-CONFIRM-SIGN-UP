<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Zened - Reset Password</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 100px;
    }

    input {
      padding: 10px;
      width: 250px;
      font-size: 16px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    #status {
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <h2>Reset your password</h2>

  <input id="password" type="password" placeholder="Enter new password" />
  <br>

  <button onclick="updatePassword()">Update Password</button>

  <p id="status"></p>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabase = createClient(
      "YOUR_SUPABASE_URL",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhc3VtbmRyZ2hjcmt4ZHlzbWRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1ODg2NTUsImV4cCI6MjA5NDE2NDY1NX0.l7nuTRv-pP2BcTLmG2tdgoHDPeQFzGF9zMnfGr_kOv0"
    )

    async function updatePassword() {
      const password = document.getElementById("password").value
      const status = document.getElementById("status")

      status.innerText = "Updating password..."

      const { data, error } = await supabase.auth.updateUser({
        password: password
      })

      if (error) {
        console.log(error)
        status.innerText = "Error updating password"
        return
      }

      status.innerText = "Password updated! Redirecting..."

      setTimeout(() => {
        window.location.href = "/"
      }, 1200)
    }

    window.updatePassword = updatePassword
  </script>

</body>
</html>
