<!DOCTYPE html>
<html>
<head>
  <title>Zened Reset Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    input, button {
      padding: 12px;
      margin: 8px;
      width: 250px;
      border-radius: 6px;
      border: none;
    }

    button {
      cursor: pointer;
    }

    #status {
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <h2>Reset Password</h2>

  <form id="resetForm">
    <input type="password" id="password" placeholder="New password" required />
    <button type="submit" id="submitBtn" disabled>Update Password</button>
  </form>

  <div id="status">Loading session...</div>

  <script>
   
    const supabase = window.supabase.createClient(
      "https://basumndrghcrkxdysmdn.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhc3VtbmRyZ2hjcmt4ZHlzbWRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1ODg2NTUsImV4cCI6MjA5NDE2NDY1NX0.l7nuTRv-pP2BcTLmG2tdgoHDPeQFzGF9zMnfGr_kOv0"
    );

    const status = document.getElementById("status");
    const submitBtn = document.getElementById("submitBtn");

    let sessionReady = false;

   
    async function initRecovery() {
      try {
        const { error } = await supabase.auth.exchangeCodeForSession(window.location.href);

        if (error) {
          console.error(error);
          status.innerText = "Invalid or expired reset link";
          return;
        }

        const { data } = await supabase.auth.getUser();

        if (data?.user) {
          sessionReady = true;
          submitBtn.disabled = false;
          status.innerText = "Session ready — enter new password";
        } else {
          status.innerText = "No active session found";
        }

      } catch (err) {
        console.error(err);
        status.innerText = "Something went wrong";
      }
    }

    initRecovery();

    
    document.getElementById("resetForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      if (!sessionReady) {
        alert("Session not ready yet");
        return;
      }

      const password = document.getElementById("password").value;

      const { error } = await supabase.auth.updateUser({
        password: password
      });

      if (error) {
        console.error(error);
        alert("Error updating password: " + error.message);
      } else {
        status.innerText = "Password updated successfully ✔";
        alert("Password updated successfully");
      }
    });
  </script>

</body>
</html>
