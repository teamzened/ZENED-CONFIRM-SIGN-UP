<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zened - Reset Password</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 340px;
      background: #1a1a1a;
      padding: 25px;
      border-radius: 12px;
      text-align: center;
    }

    h1 {
      color: #4ade80;
      font-size: 26px;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 20px;
      margin: 10px 0;
    }

    p {
      font-size: 13px;
      opacity: 0.6;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      background: #4ade80;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
    }

    #status {
      margin-top: 10px;
      font-size: 13px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <div class="card">

    <h1>Zened</h1>
    <h2>Set new password</h2>
    <p>Secure your account to continue</p>

    <input id="password" type="password" placeholder="New password" />

    <button onclick="updatePassword()">Update Password</button>

    <p id="status"></p>

  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabase = createClient(
      "basumndrghcrkxdysmdn",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhc3VtbmRyZ2hjcmt4ZHlzbWRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1ODg2NTUsImV4cCI6MjA5NDE2NDY1NX0.l7nuTRv-pP2BcTLmG2tdgoHDPeQFzGF9zMnfGr_kOv0"
    )

    async function updatePassword() {
      const password = document.getElementById("password").value
      const status = document.getElementById("status")

      status.innerText = "Updating password..."

      const { error } = await supabase.auth.updateUser({
        password: password
      })

      if (error) {
        status.innerText = "Error updating password"
        return
      }

      status.innerText = "Password updated!"

      setTimeout(() => {
        window.location.href = "/"
      }, 1200)
    }

    window.updatePassword = updatePassword
  </script>

</body>
</html>
