<!DOCTYPE html>
<html>
<head>
  <title>Zened Reset Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    input, button {
      padding: 12px;
      margin: 8px;
      width: 260px;
      border-radius: 6px;
      border: none;
      font-size: 16px;
    }
    button {
      cursor: pointer;
      background: #fff;
      color: #000;
      font-weight: bold;
    }
    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    #status {
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <h2>Reset Password</h2>
  <input type="password" id="password" placeholder="New password" />
  <button id="submitBtn" disabled onclick="updatePassword()">Update Password</button>
  <div id="status">Loading session...</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const sbClient = window.supabase.createClient(
      "https://basumndrghcrkxdysmdn.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhc3VtbmRyZ2hjcmt4ZHlzbWRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1ODg2NTUsImV4cCI6MjA5NDE2NDY1NX0.l7nuTRv-pP2BcTLmG2tdgoHDPeQFzGF9zMnfGr_kOv0"
    );

    const status = document.getElementById("status");
    const submitBtn = document.getElementById("submitBtn");

    async function initRecovery() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get("code");

      console.log("Code from URL:", code);

      if (!code) {
        status.innerText = "No reset code found in URL";
        return;
      }

      try {
        const { data, error } = await sbClient.auth.exchangeCodeForSession(code);

        console.log("Exchange data:", data);
        console.log("Exchange error:", error);

        if (error) {
          status.innerText = "Error: " + error.message;
          return;
        }

        if (data?.session) {
          status.innerText = "Session ready — enter your new password";
          submitBtn.disabled = false;
        } else {
          status.innerText = "No session returned";
        }

      } catch (err) {
        console.log("Crash:", err);
        status.innerText = "Unexpected error: " + err.message;
      }
    }

    initRecovery();

    async function updatePassword() {
      const password = document.getElementById("password").value;
      if (!password) return;

      submitBtn.disabled = true;
      status.innerText = "Updating...";

      const { error } = await sbClient.auth.updateUser({ password });

      if (error) {
        status.innerText = "Error: " + error.message;
        submitBtn.disabled = false;
      } else {
        status.innerText = "✅ Password updated! You can close this page.";
      }
    }
  </script>

</body>
</html>
