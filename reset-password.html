<!DOCTYPE html>
<html>
<head>
  <title>Zened Reset Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    input, button {
      padding: 12px;
      margin: 8px;
      width: 260px;
      border-radius: 6px;
      border: none;
    }

    button {
      cursor: pointer;
    }

    #status {
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <h2>Reset Password</h2>

  <form id="resetForm">
    <input type="password" id="password" placeholder="New password" required />
    <button type="submit" id="submitBtn" disabled>Update Password</button>
  </form>

  <div id="status">Loading session...</div>

  <script>
    const supabase = window.supabase.createClient(
      "https://basumndrghcrkxdysmdn.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhc3VtbmRyZ2hjcmt4ZHlzbWRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1ODg2NTUsImV4cCI6MjA5NDE2NDY1NX0.l7nuTRv-pP2BcTLmG2tdgoHDPeQFzGF9zMnfGr_kOv0"
    );

    const status = document.getElementById("status");
    const submitBtn = document.getElementById("submitBtn");

    async function initRecovery() {
      console.log("URL:", window.location.href);

      try {
        const { data, error } =
          await supabase.auth.exchangeCodeForSession(window.location.href);

        console.log("EXCHANGE ERROR:", error);
        console.log("EXCHANGE DATA:", data);

        const { data: userData, error: userError } =
          await supabase.auth.getUser();

        console.log("USER:", userData);
        console.log("USER ERROR:", userError);

        if (userData?.user) {
          status.innerText = "Session ready";
          submitBtn.disabled = false;
        } else {
          status.innerText = "No session created";
          submitBtn.disabled = false;
        }

      } catch (err) {
        console.log("CRASH:", err);
        status.innerText = "Error loading session";
        submitBtn.disabled = false;
      }
    }

    initRecovery();

    document.getElementById("resetForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const password = document.getElementById("password").value;

      const { error } = await supabase.auth.updateUser({
        password: password
      });

      if (error) {
        console.log(error);
        alert(error.message);
      } else {
        status.innerText = "Password updated successfully";
      }
    });
  
  </script>
  setTimeout(async () => {
  console.log("FINAL SESSION CHECK:", await supabase.auth.getSession())
}, 3000)
</script>

</body>
</html>
