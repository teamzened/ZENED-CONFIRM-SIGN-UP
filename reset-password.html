<script>
  const { createClient } = window.supabase;
  const supabase = createClient(
    "https://basumndrghcrkxdysmdn.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhc3VtbmRyZ2hjcmt4ZHlzbWRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1ODg2NTUsImV4cCI6MjA5NDE2NDY1NX0.l7nuTRv-pP2BcTLmG2tdgoHDPeQFzGF9zMnfGr_kOv0"
  );

  const status = document.getElementById("status");
  const submitBtn = document.getElementById("submitBtn");

  async function initRecovery() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");

    console.log("Code from URL:", code);

    if (!code) {
      status.innerText = "No reset code found in URL";
      return;
    }

    try {
      // Exchange the code for a session
      const { data, error } = await supabase.auth.exchangeCodeForSession(code);

      console.log("Exchange data:", data);
      console.log("Exchange error:", error);

      if (error) {
        status.innerText = "Error: " + error.message;
        return;
      }

      if (data?.session) {
        status.innerText = "Session ready — enter your new password";
        submitBtn.disabled = false;
      } else {
        status.innerText = "No session returned";
      }

    } catch (err) {
      console.log("Crash:", err);
      status.innerText = "Unexpected error: " + err.message;
    }
  }

  initRecovery();

  async function updatePassword() {
    const password = document.getElementById("password").value;
    if (!password) return;

    submitBtn.disabled = true;
    status.innerText = "Updating...";

    const { error } = await supabase.auth.updateUser({ password });

    if (error) {
      status.innerText = "Error: " + error.message;
      submitBtn.disabled = false;
    } else {
      status.innerText = "✅ Password updated! You can close this page.";
    }
  }
</script>
